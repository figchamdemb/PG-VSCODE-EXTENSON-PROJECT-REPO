<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>PG Reviewer</title>
  <link rel="stylesheet" href="/assets/site.css" />
  <style>
    :root { --accent: #7c5cfc; --green: #34d399; --red: #f87171; --amber: #fbbf24; --card-bg: rgba(30,30,44,0.88); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a; color: #e2e2f0; min-height: 100dvh; padding-bottom: 80px; }
    .header { position: sticky; top: 0; z-index: 10; background: rgba(15,15,26,0.95);
      backdrop-filter: blur(12px); padding: 12px 16px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid rgba(124,92,252,0.15); }
    .header h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .header .status { font-size: 0.75rem; color: #888; }
    .refresh-btn { background: none; border: 1px solid rgba(124,92,252,0.3);
      color: var(--accent); padding: 6px 14px; border-radius: 8px; font-size: 0.8rem;
      cursor: pointer; transition: all 0.2s; }
    .refresh-btn:active { background: rgba(124,92,252,0.15); }
    .kpi-strip { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; }
    .kpi-card { flex: 0 0 auto; min-width: 100px; background: var(--card-bg);
      border-radius: 12px; padding: 12px 14px; text-align: center;
      border: 1px solid rgba(124,92,252,0.1); }
    .kpi-card .value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .kpi-card .label { font-size: 0.7rem; color: #999; margin-top: 2px; text-transform: uppercase; }
    .section-label { font-size: 0.75rem; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.5px; padding: 16px 16px 8px; }
    .thread-list { padding: 0 12px; display: flex; flex-direction: column; gap: 10px; }
    .thread-card { background: var(--card-bg); border-radius: 14px;
      padding: 14px 16px; border: 1px solid rgba(124,92,252,0.08);
      transition: transform 0.15s; }
    .thread-card:active { transform: scale(0.98); }
    .thread-card .title { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
    .thread-card .meta { font-size: 0.75rem; color: #888; display: flex; gap: 12px; flex-wrap: wrap; }
    .thread-card .actions { display: flex; gap: 8px; margin-top: 10px; }
    .action-btn { flex: 1; border: none; border-radius: 10px; padding: 10px 6px;
      font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
      color: #fff; }
    .action-btn:active { transform: scale(0.96); }
    .btn-approve { background: var(--green); }
    .btn-reject { background: var(--red); }
    .btn-change { background: var(--amber); color: #1a1a2e; }
    .btn-approve:disabled, .btn-reject:disabled, .btn-change:disabled {
      opacity: 0.4; cursor: not-allowed; }
    .decision-list { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }
    .decision-card { background: var(--card-bg); border-radius: 12px;
      padding: 12px 14px; border: 1px solid rgba(124,92,252,0.06); }
    .decision-card .title { font-size: 0.9rem; font-weight: 600; }
    .decision-card .meta { font-size: 0.72rem; color: #888; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: 0.7rem; font-weight: 600; margin-left: 6px; }
    .badge-approve { background: rgba(52,211,153,0.15); color: var(--green); }
    .badge-reject { background: rgba(248,113,113,0.15); color: var(--red); }
    .badge-needs_change { background: rgba(251,191,36,0.15); color: var(--amber); }
    .empty-state { text-align: center; padding: 40px 20px; color: #666; font-size: 0.9rem; }
    .auth-gate { display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 80dvh; gap: 16px; padding: 20px; }
    .auth-gate h2 { color: var(--accent); }
    .auth-gate input { width: 100%; max-width: 320px; padding: 12px; border-radius: 10px;
      border: 1px solid rgba(124,92,252,0.3); background: rgba(30,30,44,0.9);
      color: #e2e2f0; font-size: 1rem; }
    .auth-gate button { width: 100%; max-width: 320px; padding: 12px;
      border-radius: 10px; border: none; background: var(--accent);
      color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(15,15,26,0.97); backdrop-filter: blur(12px);
      border-top: 1px solid rgba(124,92,252,0.12); display: flex;
      justify-content: space-around; padding: 10px 0 env(safe-area-inset-bottom, 8px); z-index: 10; }
    .nav-item { display: flex; flex-direction: column; align-items: center;
      font-size: 0.65rem; color: #888; cursor: pointer; padding: 4px 12px;
      transition: color 0.2s; }
    .nav-item.active { color: var(--accent); }
    .nav-item .icon { font-size: 1.2rem; margin-bottom: 2px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .spinner { display: inline-block; width: 20px; height: 20px;
      border: 2px solid rgba(124,92,252,0.2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay { display: flex; justify-content: center; padding: 40px; }
    .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: var(--card-bg); color: #e2e2f0; padding: 10px 20px;
      border-radius: 10px; font-size: 0.85rem; z-index: 100;
      border: 1px solid rgba(124,92,252,0.2); opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div id="authGate" class="auth-gate" style="display:none;">
    <h2>PG Reviewer</h2>
    <p style="color:#888;text-align:center;">Sign in to access mobile governance reviewer panel.</p>
    <input id="authEmail" type="email" placeholder="you@company.com" />
    <button id="authSendCode" onclick="sendAuthCode()">Send Login Code</button>
    <input id="authCode" type="text" placeholder="6-digit code" style="display:none;" />
    <button id="authVerify" onclick="verifyAuthCode()" style="display:none;">Verify</button>
  </div>

  <div id="mainApp" style="display:none;">
    <header class="header">
      <div>
        <h1>PG Reviewer</h1>
        <div class="status" id="statusLine">Loading...</div>
      </div>
      <button class="refresh-btn" onclick="loadDashboard()">Refresh</button>
    </header>

    <div id="tabDashboard" class="tab-content active">
      <div class="kpi-strip" id="kpiStrip"></div>
      <div class="section-label">Pending Review</div>
      <div class="thread-list" id="pendingList"></div>
      <div class="section-label" style="margin-top:8px;">Recent Decisions</div>
      <div class="decision-list" id="decisionList"></div>
    </div>

    <div id="tabPending" class="tab-content">
      <div class="section-label">All Pending Threads</div>
      <div class="thread-list" id="pendingListFull"></div>
    </div>

    <nav class="bottom-nav">
      <div class="nav-item active" onclick="switchTab('tabDashboard', this)">
        <span class="icon">&#x1F4CA;</span>Dashboard
      </div>
      <div class="nav-item" onclick="switchTab('tabPending', this)">
        <span class="icon">&#x1F4CB;</span>Pending
      </div>
      <div class="nav-item" onclick="location.href='/app.html'">
        <span class="icon">&#x2699;</span>Portal
      </div>
    </nav>
  </div>

  <script>
    let authToken = null;
    let currentData = null;

    async function api(method, path, body) {
      const opts = { method, credentials: "include", headers: {} };
      if (body) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
      if (authToken) opts.headers["Authorization"] = "Bearer " + authToken;
      const res = await fetch(path, opts);
      if (res.status === 401) { showAuth(); throw new Error("auth"); }
      return res;
    }

    function showAuth() {
      document.getElementById("authGate").style.display = "flex";
      document.getElementById("mainApp").style.display = "none";
    }

    function showApp() {
      document.getElementById("authGate").style.display = "none";
      document.getElementById("mainApp").style.display = "block";
    }

    async function sendAuthCode() {
      const email = document.getElementById("authEmail").value.trim();
      if (!email) return;
      try {
        await api("POST", "/auth/request-code", { email });
        document.getElementById("authCode").style.display = "";
        document.getElementById("authVerify").style.display = "";
        toast("Code sent to " + email);
      } catch { toast("Failed to send code"); }
    }

    async function verifyAuthCode() {
      const email = document.getElementById("authEmail").value.trim();
      const code = document.getElementById("authCode").value.trim();
      if (!email || !code) return;
      try {
        const res = await fetch("/auth/verify-code", {
          method: "POST", credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, code })
        });
        if (!res.ok) { toast("Invalid code"); return; }
        const data = await res.json();
        authToken = data.token || null;
        showApp();
        loadDashboard();
      } catch { toast("Verification failed"); }
    }

    async function loadDashboard() {
      document.getElementById("statusLine").textContent = "Loading...";
      try {
        const res = await api("GET", "/account/governance/reviewer/dashboard");
        if (!res.ok) { document.getElementById("statusLine").textContent = "Error"; return; }
        currentData = await res.json();
        renderDashboard(currentData);
        document.getElementById("statusLine").textContent =
          "Updated " + new Date(currentData.evaluated_at).toLocaleTimeString();
      } catch (e) {
        if (e.message !== "auth") document.getElementById("statusLine").textContent = "Offline";
      }
    }

    function renderDashboard(data) {
      // KPIs
      const kpiHtml = [
        kpiCard(data.kpis.pending_threads, "Pending"),
        kpiCard(data.kpis.decided_today, "Today"),
        kpiCard(data.kpis.avg_latency_hours != null ? data.kpis.avg_latency_hours + "h" : "—", "Avg Latency")
      ].join("");
      document.getElementById("kpiStrip").innerHTML = kpiHtml;

      // Pending
      const pendingHtml = data.pending.length === 0
        ? '<div class="empty-state">No pending threads</div>'
        : data.pending.map(threadCard).join("");
      document.getElementById("pendingList").innerHTML = pendingHtml;
      document.getElementById("pendingListFull").innerHTML = pendingHtml;

      // Decisions
      const decHtml = data.recent_decisions.length === 0
        ? '<div class="empty-state">No recent decisions</div>'
        : data.recent_decisions.map(decisionCard).join("");
      document.getElementById("decisionList").innerHTML = decHtml;
    }

    function kpiCard(value, label) {
      return '<div class="kpi-card"><div class="value">' + value + '</div><div class="label">' + label + '</div></div>';
    }

    function threadCard(t) {
      const ago = timeAgo(t.created_at);
      return '<div class="thread-card">' +
        '<div class="title">' + esc(t.title) + '</div>' +
        '<div class="meta"><span>' + ago + '</span><span>' + t.vote_count + ' votes</span><span>' + t.entry_count + ' entries</span></div>' +
        '<div class="actions">' +
          '<button class="action-btn btn-approve" onclick="quickAction(\'' + t.thread_id + '\',\'approve\',this)">Approve</button>' +
          '<button class="action-btn btn-reject" onclick="quickAction(\'' + t.thread_id + '\',\'reject\',this)">Reject</button>' +
          '<button class="action-btn btn-change" onclick="quickAction(\'' + t.thread_id + '\',\'needs_change\',this)">Change</button>' +
        '</div></div>';
    }

    function decisionCard(d) {
      const cls = "badge badge-" + d.decision;
      const label = d.decision.replace(/_/g, " ");
      return '<div class="decision-card">' +
        '<div class="title">' + esc(d.title) + '<span class="' + cls + '">' + label + '</span></div>' +
        '<div class="meta">' + new Date(d.decided_at).toLocaleDateString() + '</div>' +
        '</div>';
    }

    async function quickAction(threadId, action, btn) {
      const row = btn.closest(".thread-card");
      const buttons = row.querySelectorAll(".action-btn");
      buttons.forEach(b => b.disabled = true);
      try {
        const res = await api("POST", "/account/governance/reviewer/quick-action", {
          thread_id: threadId, action: action
        });
        if (!res.ok) { const err = await res.json().catch(() => ({})); toast(err.error || "Failed"); buttons.forEach(b => b.disabled = false); return; }
        toast(action.replace(/_/g, " ") + " applied");
        row.style.opacity = "0.4";
        setTimeout(() => loadDashboard(), 600);
      } catch { buttons.forEach(b => b.disabled = false); toast("Network error"); }
    }

    function switchTab(tabId, el) {
      document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
      document.getElementById(tabId).classList.add("active");
      document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
      el.classList.add("active");
    }

    function toast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2200);
    }

    function timeAgo(iso) {
      const ms = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(ms / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return mins + "m ago";
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + "h ago";
      return Math.floor(hrs / 24) + "d ago";
    }

    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

    // ── Init ──────────────────────────────────────────────────────────────
    (async function init() {
      try {
        const res = await api("GET", "/account/governance/reviewer/dashboard");
        if (res.ok) { showApp(); currentData = await res.json(); renderDashboard(currentData);
          document.getElementById("statusLine").textContent = "Updated " + new Date(currentData.evaluated_at).toLocaleTimeString();
        } else { showAuth(); }
      } catch { showAuth(); }
    })();
  </script>
</body>
</html>
